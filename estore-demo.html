<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Canvas Media — E-Store</title>
  <style>
    :root{
      --cyan:#00C0E0;
      --cyan-dark:#0099b8;
      --cyan-light:#e0f8fd;
      --magenta:#E6007E;
      --magenta-dark:#b8005f;
      --magenta-light:#fce4f1;
      --yellow:#FFE800;
      --yellow-dark:#d4be00;
      --black:#111111;
      --black2:#1e1e1e;
      --white:#ffffff;
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#111111;
      --muted:#6b7280;
      --border:#e0e0e0;
      --radius:14px;
      --shadow:0 2px 12px rgba(0,0,0,.08);
      --shadow-hover:0 8px 30px rgba(0,0,0,.16);
      --sidebar:232px;
      --header:62px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}

    /* ── HEADER ── */
    header{
      background:var(--black);height:var(--header);padding:0 24px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:300;
      box-shadow:0 2px 16px rgba(0,0,0,.4);
    }
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-mark{
      width:38px;height:38px;border-radius:8px;overflow:hidden;
      display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;flex-shrink:0;
    }
    .logo-mark div{width:100%;height:100%}
    .logo-c{background:var(--cyan)}
    .logo-m{background:var(--magenta)}
    .logo-y{background:var(--yellow)}
    .logo-k{background:var(--black2);border:1px solid #333}
    .logo-text{color:#fff;font-size:17px;font-weight:800;letter-spacing:.3px}
    .logo-text span{color:var(--cyan)}
    .header-center{flex:1;display:flex;justify-content:center}
    .header-search{
      position:relative;width:100%;max-width:380px;
    }
    .header-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#888}
    #searchInput{
      width:100%;padding:9px 12px 9px 38px;
      background:#2a2a2a;border:1.5px solid #3a3a3a;border-radius:10px;
      font-size:14px;color:#fff;outline:none;transition:border .2s;
    }
    #searchInput::placeholder{color:#888}
    #searchInput:focus{border-color:var(--cyan)}
    .header-right{display:flex;align-items:center;gap:12px}
    .cart-toggle{
      position:relative;background:var(--cyan);color:var(--black);
      border:none;border-radius:10px;padding:9px 16px;
      font-size:13px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;gap:7px;transition:background .2s;white-space:nowrap;
    }
    .cart-toggle:hover{background:var(--cyan-dark);color:#fff}
    .cart-badge{
      position:absolute;top:-7px;right:-7px;
      background:var(--magenta);color:#fff;
      width:20px;height:20px;border-radius:50%;
      font-size:11px;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      border:2px solid var(--black);
      transition:transform .2s;
    }
    .cart-badge.pop{transform:scale(1.4)}
    .cart-badge.hidden{display:none}

    /* ── LAYOUT ── */
    .layout{display:flex;flex:1;position:relative}

    /* ── SIDEBAR ── */
    aside{
      width:var(--sidebar);flex-shrink:0;background:#fff;
      border-right:1px solid var(--border);
      position:sticky;top:var(--header);
      height:calc(100vh - var(--header));overflow-y:auto;
      padding:16px 0;
    }
    .sidebar-title{
      font-size:10px;font-weight:700;color:var(--muted);
      text-transform:uppercase;letter-spacing:1.2px;
      padding:0 18px 10px;
    }
    .nav-item{
      display:flex;align-items:center;gap:8px;
      padding:9px 18px;cursor:pointer;
      border-left:3px solid transparent;
      font-size:13px;color:var(--text);font-weight:500;
      transition:all .15s;
    }
    .nav-item:hover{background:#f5f5f5;color:var(--cyan-dark)}
    .nav-item.active{
      background:var(--cyan-light);border-left-color:var(--cyan);
      color:var(--cyan-dark);font-weight:700;
    }
    .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
    .nav-count{
      margin-left:auto;background:#f0f0f0;color:var(--muted);
      font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500;
    }
    .nav-item.active .nav-count{background:var(--cyan);color:var(--black);font-weight:700}
    .nav-ph{opacity:.6;font-style:italic}

    /* ── MAIN ── */
    main{flex:1;min-width:0;display:flex;flex-direction:column}

    /* ── HERO ── */
    .hero{
      background:var(--black);color:#fff;
      padding:36px 32px 30px;
      border-bottom:3px solid var(--cyan);
    }
    .hero-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
    .hero-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(0,192,224,.15);border:1px solid var(--cyan);
      color:var(--cyan);border-radius:50px;padding:4px 14px;
      font-size:12px;font-weight:700;margin-bottom:10px;
    }
    .hero-content h1{font-size:28px;font-weight:900;line-height:1.15;margin-bottom:6px}
    .hero-content h1 span{color:var(--cyan)}
    .hero-content p{font-size:13px;color:#94a3b8;line-height:1.6;max-width:400px}
    .hero-stats{display:flex;gap:24px;margin-top:18px}
    .stat-num{font-size:22px;font-weight:800;color:var(--cyan)}
    .stat-label{font-size:11px;color:#94a3b8;margin-top:1px}

    /* ── CONTROLS ── */
    .controls{
      background:#fff;border-bottom:1px solid var(--border);
      padding:12px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    }
    .filter-group{display:flex;gap:6px;flex-wrap:wrap}
    .filter-btn{
      padding:6px 14px;border-radius:8px;
      border:1.5px solid var(--border);background:#fff;
      font-size:12px;font-weight:600;cursor:pointer;
      transition:all .18s;color:var(--muted);
    }
    .filter-btn.active{background:var(--black);border-color:var(--black);color:#fff}
    .filter-btn:hover:not(.active){border-color:var(--cyan);color:var(--cyan-dark)}
    .results-count{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}

    /* ── GRID ── */
    .grid-wrap{padding:24px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}

    /* ── CARD ── */
    .card{
      background:var(--card);border-radius:var(--radius);
      box-shadow:var(--shadow);overflow:hidden;
      transition:transform .22s,box-shadow .22s;
      display:flex;flex-direction:column;
    }
    .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}
    .card-img-wrap{
      position:relative;overflow:hidden;
      background:#f8f8f8;aspect-ratio:1/1;cursor:pointer;
    }
    .card-img-wrap img{
      width:100%;height:100%;object-fit:contain;
      padding:14px;transition:transform .3s;display:block;
    }
    .card:hover .card-img-wrap img{transform:scale(1.06)}
    .placeholder-img{
      width:100%;height:100%;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:8px;cursor:pointer;
    }
    .ph-icon{font-size:48px;opacity:.3}
    .ph-label{font-size:11px;color:var(--muted);font-style:italic}

    .badge{position:absolute;top:10px;left:10px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    .badge-outlet{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
    .badge-unico{background:#fff7ed;color:#ea580c;border:1px solid #fdba74}

    .card-body{padding:13px 15px 15px;flex:1;display:flex;flex-direction:column;gap:6px}
    .card-code{font-size:10px;color:var(--muted);font-family:monospace}
    .card-name{font-size:13px;font-weight:700;line-height:1.3;flex:1}
    .card-variants{display:flex;gap:5px;flex-wrap:wrap}
    .variant-dot{
      width:18px;height:18px;border-radius:50%;cursor:pointer;
      border:2px solid transparent;transition:all .18s;
    }
    .variant-dot.active{border-color:var(--magenta);transform:scale(1.2)}
    .variant-dot:hover{transform:scale(1.15)}
    .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px;border-top:1px solid #f0f0f0}
    .price{font-size:18px;font-weight:800;color:var(--black)}
    .price-sub{font-size:10px;color:var(--muted)}
    .price-na{font-size:11px;color:var(--muted);font-style:italic}
    .card-actions{display:flex;gap:6px}
    .btn-add{
      background:var(--magenta);color:#fff;border:none;
      border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;
      cursor:pointer;transition:background .18s;white-space:nowrap;
    }
    .btn-add:hover{background:var(--magenta-dark)}
    .btn-detail{
      background:#f0f0f0;color:var(--black);border:none;
      border-radius:8px;padding:7px 10px;font-size:12px;font-weight:600;
      cursor:pointer;transition:background .18s;
    }
    .btn-detail:hover{background:var(--cyan-light);color:var(--cyan-dark)}

    /* ── CART DRAWER ── */
    .cart-overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.45);z-index:400;
    }
    .cart-overlay.open{display:block}
    .cart-drawer{
      position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;
      background:#fff;z-index:401;
      display:flex;flex-direction:column;
      box-shadow:-4px 0 30px rgba(0,0,0,.18);
      transform:translateX(100%);transition:transform .3s ease;
    }
    .cart-drawer.open{transform:translateX(0)}
    .cart-header{
      background:var(--black);color:#fff;
      padding:18px 20px;display:flex;align-items:center;justify-content:space-between;
    }
    .cart-header h2{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
    .cart-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;opacity:.7;transition:opacity .2s}
    .cart-close:hover{opacity:1}
    .cart-body{flex:1;overflow-y:auto;padding:16px}
    .cart-empty{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;height:100%;gap:12px;color:var(--muted);text-align:center;
    }
    .cart-empty-icon{font-size:52px;opacity:.3}
    .cart-empty p{font-size:14px}
    .cart-item{
      display:flex;gap:12px;padding:14px 0;
      border-bottom:1px solid var(--border);
    }
    .cart-item:last-child{border-bottom:none}
    .ci-img{
      width:64px;height:64px;border-radius:10px;
      background:#f8f8f8;overflow:hidden;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
    }
    .ci-img img{width:100%;height:100%;object-fit:contain;padding:6px}
    .ci-img .ph-icon{font-size:28px;opacity:.35}
    .ci-info{flex:1;min-width:0}
    .ci-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:2px}
    .ci-code{font-size:11px;color:var(--muted);font-family:monospace}
    .ci-color{
      display:inline-flex;align-items:center;gap:5px;
      font-size:11px;color:var(--muted);margin-top:3px;
    }
    .ci-colordot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
    .ci-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
    .ci-qty{display:flex;align-items:center;gap:6px}
    .qty-btn{
      width:24px;height:24px;border-radius:6px;border:1.5px solid var(--border);
      background:#fff;cursor:pointer;font-size:14px;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      transition:all .15s;color:var(--black);
    }
    .qty-btn:hover{border-color:var(--cyan);color:var(--cyan-dark)}
    .qty-val{font-size:13px;font-weight:700;min-width:20px;text-align:center}
    .ci-price{font-size:14px;font-weight:800;color:var(--black)}
    .ci-price.na{font-size:11px;color:var(--muted);font-style:italic;font-weight:400}
    .ci-remove{
      background:none;border:none;color:#ccc;cursor:pointer;
      font-size:16px;padding:0 4px;transition:color .15s;align-self:flex-start;
    }
    .ci-remove:hover{color:var(--magenta)}
    .cart-footer{
      padding:16px 20px;border-top:2px solid var(--border);
      background:#fafafa;
    }
    .cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .cart-total-label{font-size:12px;color:var(--muted)}
    .cart-total-label.main{font-size:14px;font-weight:700;color:var(--black)}
    .cart-total-val{font-size:13px;font-weight:600;color:var(--black)}
    .cart-total-val.main{font-size:20px;font-weight:900;color:var(--black)}
    .cart-note{font-size:11px;color:var(--muted);margin:8px 0 12px;line-height:1.5}
    .btn-quote{
      width:100%;padding:14px;background:var(--cyan);color:var(--black);
      border:none;border-radius:12px;font-size:15px;font-weight:800;
      cursor:pointer;transition:background .2s;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn-quote:hover{background:var(--cyan-dark);color:#fff}
    .btn-clear{
      width:100%;padding:10px;background:#f0f0f0;color:var(--muted);
      border:none;border-radius:10px;font-size:13px;font-weight:600;
      cursor:pointer;transition:background .2s;margin-top:8px;
    }
    .btn-clear:hover{background:#e0e0e0;color:var(--black)}

    /* ── MODAL ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal-wrapper{position:relative;max-width:820px;width:100%}
    .modal{background:#fff;border-radius:20px;max-height:88vh;overflow-y:auto;display:flex;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    .modal-gallery{width:44%;flex-shrink:0;padding:22px;background:#f8f8f8;border-radius:20px 0 0 20px;display:flex;flex-direction:column;gap:10px}
    .modal-main-img{width:100%;aspect-ratio:1/1;object-fit:contain;border-radius:12px;background:#fff}
    .modal-main-ph{width:100%;aspect-ratio:1/1;background:#f0f0f0;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
    .modal-thumbs{display:flex;gap:6px;flex-wrap:wrap}
    .modal-thumb{width:52px;height:52px;object-fit:contain;border-radius:8px;background:#fff;cursor:pointer;border:2px solid transparent;padding:4px;transition:border .18s}
    .modal-thumb.active,.modal-thumb:hover{border-color:var(--cyan)}
    .modal-info{flex:1;padding:26px 24px;display:flex;flex-direction:column}
    .modal-badge{margin-bottom:10px;display:inline-block}
    .modal-ph-notice{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:9px 13px;font-size:11px;color:#92400e;margin-bottom:12px}
    .modal-code{font-size:11px;color:var(--muted);font-family:monospace;margin-bottom:4px}
    .modal-name{font-size:22px;font-weight:900;line-height:1.2;margin-bottom:4px}
    .modal-price{font-size:30px;font-weight:900;color:var(--black);margin:10px 0 2px}
    .modal-price-label{font-size:11px;color:var(--muted);margin-bottom:14px}
    hr.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
    .modal-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
    .modal-variants{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .modal-variant-btn{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all .18s;font-size:12px;font-weight:500;background:#fff}
    .modal-variant-btn.active{border-color:var(--cyan);background:var(--cyan-light);color:var(--cyan-dark)}
    .modal-variant-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
    .modal-actions{display:flex;gap:10px;margin-top:auto;padding-top:14px}
    .modal-btn-add{flex:1;padding:13px;background:var(--magenta);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;transition:background .2s}
    .modal-btn-add:hover{background:var(--magenta-dark)}
    .modal-btn-detail{padding:13px 16px;background:#f0f0f0;color:var(--black);border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
    .modal-btn-detail:hover{background:var(--cyan-light);color:var(--cyan-dark)}
    .modal-close{position:absolute;top:14px;right:14px;background:#fff;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:10}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
      background:var(--black);color:#fff;padding:12px 20px;border-radius:10px;
      font-size:13px;font-weight:600;z-index:600;opacity:0;
      transition:all .3s;white-space:nowrap;
      border-left:4px solid var(--cyan);
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── FOOTER ── */
    footer{background:var(--black);color:#555;text-align:center;padding:18px 24px;font-size:11px;border-top:3px solid var(--black2)}
    footer .accent{color:var(--cyan);font-weight:700}
    .footer-bar{display:flex;justify-content:center;gap:0;margin-bottom:10px}
    .footer-bar div{height:4px;width:60px}

    /* ── EMPTY ── */
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state p{font-size:14px;margin-top:10px}

    @media(max-width:860px){
      :root{--sidebar:0px}
      aside{display:none}
      .header-center{display:none}
    }
    @media(max-width:580px){
      .hero{padding:24px 16px 20px}
      .controls,.grid-wrap{padding:12px 14px}
      .modal{flex-direction:column}
      .modal-gallery{width:100%;border-radius:20px 20px 0 0}
      header{padding:0 14px}
      .cart-drawer{width:100vw}
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">
    <div class="logo-mark">
      <div class="logo-c"></div><div class="logo-m"></div>
      <div class="logo-y"></div><div class="logo-k"></div>
    </div>
    <div class="logo-text">Canvas <span>Media</span></div>
  </a>
  <div class="header-center">
    <div class="header-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar producto o código…"/>
    </div>
  </div>
  <div class="header-right">
    <button class="cart-toggle" id="cartToggle" onclick="openCart()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Mi cotización
      <span class="cart-badge hidden" id="cartBadge">0</span>
    </button>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">
  <aside id="sidebar"></aside>
  <main>
    <div class="hero" id="heroSection">
      <div class="hero-inner">
        <div class="hero-content">
          <div class="hero-badge" id="heroBadge"></div>
          <h1 id="heroTitle"></h1>
          <p id="heroDesc"></p>
          <div class="hero-stats">
            <div class="stat"><div class="stat-num" id="statModelos">0</div><div class="stat-label">Modelos</div></div>
            <div class="stat"><div class="stat-num" id="statVariantes">0</div><div class="stat-label">Variantes</div></div>
            <div class="stat"><div class="stat-num" id="statOutlet">0</div><div class="stat-label">Outlet</div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="controls">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="PRECIO ÚNICO">Precio Único</button>
        <button class="filter-btn" data-filter="OUTLET">Outlet</button>
        <button class="filter-btn" data-filter="NORMAL">Normal</button>
      </div>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="grid-wrap">
      <div class="grid" id="productGrid"></div>

const IMG_BASE = './Audifonos/';

// ── State ─────────────────────────────────────────────────────────────────
let currentCatId = 'audifonos';
let currentFilter = 'all';
let currentSearch = '';
let currentModalProd = null;
let currentModalVariant = 0;
let cart = []; // {id, catId, prodIdx, varIdx, name, code, color, colorHex, file, precio, icon}

// ── Helpers ───────────────────────────────────────────────────────────────
const fmt = p => p!=null ? new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(p) : null;
const badgeHtml = tipo => {
  if (tipo==='OUTLET') return '<span class="badge badge-outlet">Outlet</span>';
  if (tipo==='PRECIO ÚNICO') return '<span class="badge badge-unico">Precio Único</span>';
  return '';
};
const currentCat = () => ALL_CATS.find(c=>c.id===currentCatId);

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── Sidebar ───────────────────────────────────────────────────────────────
function buildSidebar() {
  const aside = document.getElementById('sidebar');
  let html = '<div class="sidebar-title">Categorías</div>';
  ALL_CATS.forEach(cat => {
    const v = cat.products.reduce((s,p)=>s+p.variants.filter(x=>x.color!==null).length,0);
    html += `<div class="nav-item${cat.id===currentCatId?' active':''}${cat.real?'':' nav-ph'}"
      onclick="switchCat('${cat.id}')" title="${cat.real?cat.label:'Placeholder — fotos próximamente'}">
      <span class="nav-icon">${cat.icon}</span>
      <span>${cat.label}</span>
      <span class="nav-count">${v}</span>
    </div>`;
  });
  aside.innerHTML = html;
}

// ── Switch category ───────────────────────────────────────────────────────
function switchCat(catId) {
  currentCatId = catId;
  currentFilter = 'all';
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active', b.dataset.filter==='all'));
  buildSidebar();
  updateHero();
  renderGrid();
}

// ── Hero ──────────────────────────────────────────────────────────────────
function updateHero() {
  const cat = currentCat();
  const colored = cat.products.reduce((s,p)=>s+p.variants.filter(v=>v.color!==null).length,0);
  const outlet  = cat.products.filter(p=>p.tipo==='OUTLET').length;
  document.getElementById('heroBadge').innerHTML = `${cat.icon} ${cat.label}`;
  document.getElementById('heroTitle').innerHTML = `<span>${cat.label}</span>`;
  document.getElementById('heroDesc').textContent = cat.real
    ? 'Catálogo de productos personalizables. Precios LAB Guadalajara — Vigencia junio 2026.'
    : 'Fotos y nombres referenciales — próximamente con fotografía real de producto.';
  document.getElementById('statModelos').textContent = cat.products.length;
  document.getElementById('statVariantes').textContent = colored;
  document.getElementById('statOutlet').textContent = outlet;
}

// ── Cart ──────────────────────────────────────────────────────────────────
function cartKey(catId, prodIdx, varIdx) { return `${catId}:${prodIdx}:${varIdx}`; }

function addToCart(catId, prodIdx, varIdx) {
  const cat = ALL_CATS.find(c=>c.id===catId);
  const p   = cat.products[prodIdx];
  const colored = p.variants.filter(v=>v.color!==null);
  const v   = colored[varIdx] || colored[0];
  const key = cartKey(catId, prodIdx, varIdx);
  const existing = cart.find(i=>i.key===key);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({
      key, catId, prodIdx, varIdx,
      name: v.nombre || p.name,
      code: v.code,
      color: v.label,
      colorHex: v.hex,
      file: v.file,
      precio: v.precio,
      icon: cat.icon,
      qty: 1
    });
  }
  updateCartBadge();
  renderCart();
  showToast(`✔ ${v.nombre||p.name} agregado`);
  // pop badge animation
  const badge = document.getElementById('cartBadge');
  badge.classList.remove('pop');
  void badge.offsetWidth;
  badge.classList.add('pop');
  setTimeout(()=>badge.classList.remove('pop'), 300);
}

function removeFromCart(key) {
  cart = cart.filter(i=>i.key!==key);
  updateCartBadge();
  renderCart();
}

function changeQty(key, delta) {
  const item = cart.find(i=>i.key===key);
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  renderCart();
}

function updateCartBadge() {
  const badge = document.getElementById('cartBadge');
  const total = cart.reduce((s,i)=>s+i.qty,0);
  badge.textContent = total;
  badge.classList.toggle('hidden', total===0);
}

function openCart() {
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartDrawer').classList.add('open');
  document.body.style.overflow='hidden';
  renderCart();
}
function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartDrawer').classList.remove('open');
  document.body.style.overflow='';
}

function renderCart() {
  const body   = document.getElementById('cartBody');
  const footer = document.getElementById('cartFooter');
  if (cart.length===0) {
    body.innerHTML = `<div class="cart-empty">
      <span class="cart-empty-icon">🛒</span>
      <p>Tu cotización está vacía.<br/>Agrega productos para comenzar.</p>
    </div>`;
    footer.innerHTML = '';
    return;
  }

  let totalKnown = 0, hasUnknown = false;
  let html = '';
  cart.forEach(item => {
    const priceTotal = item.precio ? fmt(item.precio * item.qty) : null;
    if (item.precio) totalKnown += item.precio * item.qty;
    else hasUnknown = true;
    const imgHtml = item.file
      ? `<img src="${IMG_BASE}${item.file}" alt=""/>`
      : `<span class="ph-icon">${item.icon}</span>`;
    html += `<div class="cart-item">
      <div class="ci-img">${imgHtml}</div>
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-code">${item.code}</div>
        <div class="ci-color">
          <span class="ci-colordot" style="background:${item.colorHex};${item.colorHex==='#e8e8e8'?'border:1px solid #ccc':''}"></span>
          ${item.color}
        </div>
        <div class="ci-bottom">
          <div class="ci-qty">
            <button class="qty-btn" onclick="changeQty('${item.key}',-1)">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty('${item.key}',1)">+</button>
          </div>
          <div class="ci-price ${!item.precio?'na':''}">${priceTotal || 'Consultar'}</div>
        </div>
      </div>
      <button class="ci-remove" onclick="removeFromCart('${item.key}')" title="Eliminar">✕</button>
    </div>`;
  });
  body.innerHTML = html;

  const totalItems = cart.reduce((s,i)=>s+i.qty,0);
  footer.innerHTML = `
    <div class="cart-total-row"><span class="cart-total-label">Artículos</span><span class="cart-total-val">${totalItems}</span></div>
    <div class="cart-total-row" style="margin-bottom:8px">
      <span class="cart-total-label main">Subtotal estimado</span>
      <span class="cart-total-val main">${fmt(totalKnown)}</span>
    </div>
    ${hasUnknown ? '<p class="cart-note">⚠️ Algunos productos requieren cotización manual. Tu ejecutivo te enviará el desglose completo.</p>' : '<p class="cart-note">Precios base MXN. Mínimos y personalización a confirmar con tu ejecutivo.</p>'}
    <button class="btn-quote" onclick="sendQuote()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11 19.79 19.79 0 01.1 2.38 2 2 0 012.08.2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.09a16 16 0 006 6l1.06-1.06a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 15.27z"/></svg>
      Enviar cotización
    </button>
    <button class="btn-clear" onclick="clearCart()">Vaciar cotización</button>`;
}

function clearCart() {
  if (!confirm('¿Vaciar toda la cotización?')) return;
  cart = [];
  updateCartBadge();
  renderCart();
}

function sendQuote() {
  const lines = cart.map(i=>`• ${i.qty}x ${i.name} (${i.code}) - ${i.precio ? fmt(i.precio*i.qty) : 'Consultar'}`).join('\n');
  alert(`¡Solicitud enviada a Canvas Media!\n\nResumen:\n${lines}\n\nTu ejecutivo te contactará pronto.`);
}

// ── Grid ──────────────────────────────────────────────────────────────────
function renderGrid() {
  const cat  = currentCat();
  const grid = document.getElementById('productGrid');
  const empty= document.getElementById('emptyState');
  grid.innerHTML='';
  const search = currentSearch.toLowerCase();
  let shown=0;

  cat.products.forEach((p,idx)=>{
    const colored = p.variants.filter(v=>v.color!==null);
    if (!colored.length) return;
    const mv = colored[0];
    const tipo = p.tipo || mv.tipo || 'NORMAL';
    if (currentFilter!=='all' && tipo!==currentFilter) return;
    if (search && !p.name.toLowerCase().includes(search) && !p.id.toLowerCase().includes(search)) return;
    shown++;

    const dots = colored.length>1 ? colored.map((v,vi)=>
      `<div class="variant-dot${vi===0?' active':''}"
        style="background:${v.hex};${v.hex==='#e8e8e8'?'box-shadow:inset 0 0 0 1px #ccc':''}"
        title="${v.label}" onclick="switchVariant(event,'${cat.id}',${idx},${vi})"></div>`
    ).join('') : '';

    const imgHtml = mv.file
      ? `<img id="ci-${cat.id}-${idx}" src="${IMG_BASE}${mv.file}" alt="${p.name}" loading="lazy"/>`
      : `<div id="ci-${cat.id}-${idx}" class="placeholder-img"><span class="ph-icon">${cat.icon}</span><span class="ph-label">Foto próximamente</span></div>`;

    const priceHtml = mv.precio
      ? `<div><div class="price" id="cp-${cat.id}-${idx}">${fmt(mv.precio)}</div><div class="price-sub">Precio base MXN</div></div>`
      : `<div class="price-na">Consultar precio</div>`;

    const card = document.createElement('div');
    card.className='card'; card.dataset.catIdx=idx;
    card.innerHTML=`
      <div class="card-img-wrap" onclick="openModal('${cat.id}',${idx},0)">
        ${badgeHtml(tipo)}${imgHtml}
      </div>
      <div class="card-body">
        <div class="card-code" id="cc-${cat.id}-${idx}">${mv.code}</div>
        <div class="card-name" id="cn-${cat.id}-${idx}">${mv.nombre||p.name}</div>
        ${colored.length>1?`<div class="card-variants">${dots}</div>`:''}
        <div class="card-footer">
          ${priceHtml}
          <div class="card-actions">
            <button class="btn-detail" onclick="openModal('${cat.id}',${idx},0)">Ver</button>
            <button class="btn-add" onclick="addToCart('${cat.id}',${idx},0)">+ Cotizar</button>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById('resultsCount').textContent=`${shown} producto${shown!==1?'s':''}`;
  empty.style.display = shown===0?'block':'none';
}

// ── Variant switch (card) ─────────────────────────────────────────────────
function switchVariant(e, catId, prodIdx, varIdx) {
  e.stopPropagation();
  const cat = ALL_CATS.find(c=>c.id===catId);
  const p   = cat.products[prodIdx];
  const v   = p.variants.filter(x=>x.color!==null)[varIdx];
  const imgEl = document.getElementById(`ci-${catId}-${prodIdx}`);
  if (imgEl && v.file) {
    imgEl.outerHTML=`<img id="ci-${catId}-${prodIdx}" src="${IMG_BASE}${v.file}" alt="" style="width:100%;height:100%;object-fit:contain;padding:14px;display:block"/>`;
  }
  const priceEl=document.getElementById(`cp-${catId}-${prodIdx}`);
  if (priceEl && v.precio) priceEl.textContent=fmt(v.precio);
  const codeEl=document.getElementById(`cc-${catId}-${prodIdx}`);
  if (codeEl) codeEl.textContent=v.code;
  const nameEl=document.getElementById(`cn-${catId}-${prodIdx}`);
  if (nameEl && v.nombre) nameEl.textContent=v.nombre;
  const card=document.querySelector(`[data-cat-idx="${prodIdx}"]`);
  if (card) card.querySelectorAll('.variant-dot').forEach((d,i)=>d.classList.toggle('active',i===varIdx));
  // update "Cotizar" to use current variant
  const addBtn=card?.querySelector('.btn-add');
  if (addBtn) addBtn.onclick=()=>addToCart(catId,prodIdx,varIdx);
}

// ── Modal ─────────────────────────────────────────────────────────────────
function openModal(catId, prodIdx, varIdx) {
  currentModalProd={catId,prodIdx}; currentModalVariant=varIdx;
  renderModal();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function renderModal() {
  const cat=ALL_CATS.find(c=>c.id===currentModalProd.catId);
  const p=cat.products[currentModalProd.prodIdx];
  const colored=p.variants.filter(v=>v.color!==null);
  const v=colored[currentModalVariant]||colored[0];
  const tipo=v.tipo||p.tipo||'';
  const allImgs=v.file?[v.file,...p.extra_images.filter(f=>f.startsWith(v.code+'_'))]:[];
  const thumbs=allImgs.map((f,i)=>
    `<img src="${IMG_BASE}${f}" class="modal-thumb${i===0?' active':''}" onclick="switchModalImg(this,'${IMG_BASE}${f}')"/>`
  ).join('');
  const varBtns=colored.map((cv,ci)=>
    `<div class="modal-variant-btn${ci===currentModalVariant?' active':''}" onclick="switchModalVariant(${ci})">
      <div class="modal-variant-dot" style="background:${cv.hex};${cv.hex==='#e8e8e8'?'box-shadow:inset 0 0 0 1px #ccc':''}"></div>
      ${cv.label}
    </div>`
  ).join('');
  const mainMedia=v.file
    ?`<img class="modal-main-img" id="modalMainImg" src="${IMG_BASE}${v.file}" alt=""/>`
    :`<div class="modal-main-ph" id="modalMainImg"><span style="font-size:64px;opacity:.2">${cat.icon}</span><p style="color:var(--muted);font-size:12px">Foto próximamente</p></div>`;
  const phNotice=cat.real?'':`<div class="modal-ph-notice">⚠️ Datos de demostración — nombre, precio e imagen son referenciales.</div>`;

  document.getElementById('modalContent').innerHTML=`
    <div class="modal-gallery">
      ${mainMedia}
      ${thumbs?`<div class="modal-thumbs">${thumbs}</div>`:''}
    </div>
    <div class="modal-info">
      <div class="modal-badge">${badgeHtml(tipo)}</div>
      ${phNotice}
      <div class="modal-code">${v.code}</div>
      <div class="modal-name">${v.nombre||p.name}</div>
      <div class="modal-price">${v.precio?fmt(v.precio):'Consultar precio'}</div>
      <div class="modal-price-label">Precio base MXN${cat.real?' — LAB Guadalajara':' (referencial)'}</div>
      <hr class="divider"/>
      ${colored.length>1?`<div class="modal-section-title">Colores disponibles</div><div class="modal-variants">${varBtns}</div>`:''}
      <hr class="divider"/>
      <p style="font-size:12px;color:var(--muted);line-height:1.6">
        Producto personalizable con tu marca. Mínimos de producción aplican.
        Consulta tiempos de entrega con tu ejecutivo de Canvas Media.
      </p>
      <div class="modal-actions">
        <button class="modal-btn-detail" onclick="closeModalBtn()">Cerrar</button>
        <button class="modal-btn-add" onclick="addToCart(currentModalProd.catId,currentModalProd.prodIdx,currentModalVariant);closeModalBtn()">
          + Agregar a cotización
        </button>
      </div>
    </div>`;
}

function switchModalImg(thumb,src){
  const el=document.getElementById('modalMainImg');
  if(el?.tagName==='IMG') el.src=src;
  document.querySelectorAll('.modal-thumb').forEach(t=>t.classList.remove('active'));
  thumb.classList.add('active');
}
function switchModalVariant(varIdx){
  currentModalVariant=varIdx;
  const cat=ALL_CATS.find(c=>c.id===currentModalProd.catId);
  const p=cat.products[currentModalProd.prodIdx];
  const colored=p.variants.filter(v=>v.color!==null);
  const v=colored[varIdx];
  const allImgs=v.file?[v.file,...p.extra_images.filter(f=>f.startsWith(v.code+'_'))]:[];
  const thumbs=document.querySelector('.modal-thumbs');
  if(thumbs) thumbs.innerHTML=allImgs.map((f,i)=>`<img src="${IMG_BASE}${f}" class="modal-thumb${i===0?' active':''}" onclick="switchModalImg(this,'${IMG_BASE}${f}')"/>`).join('');
  const mainEl=document.getElementById('modalMainImg');
  if(mainEl&&v.file){if(mainEl.tagName==='IMG')mainEl.src=IMG_BASE+v.file;else mainEl.outerHTML=`<img class="modal-main-img" id="modalMainImg" src="${IMG_BASE}${v.file}" alt=""/>`;}
  const nameEl=document.querySelector('.modal-name');
  const codeEl=document.querySelector('.modal-code');
  const priceEl=document.querySelector('.modal-price');
  if(nameEl) nameEl.textContent=v.nombre||p.name;
  if(codeEl) codeEl.textContent=v.code;
  if(priceEl) priceEl.textContent=v.precio?fmt(v.precio):'Consultar precio';
  document.querySelectorAll('.modal-variant-btn').forEach((b,i)=>b.classList.toggle('active',i===varIdx));
}

function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalBtn();}
function closeModalBtn(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModalBtn();closeCart();}});

// ── Controls ──────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input',e=>{currentSearch=e.target.value;renderGrid();});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); currentFilter=btn.dataset.filter; renderGrid();
  });
});

// ── Init ──────────────────────────────────────────────────────────────────
buildSidebar(); updateHero(); renderGrid();
</script>
</body>
</html>
